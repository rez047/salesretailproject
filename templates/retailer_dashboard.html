<!DOCTYPE html>
<html>
<head>
    <title>StoreKeeper Dashboard</title>

    <style>
        body { font-family: Arial; margin:0; background:#f4f6f9; }

        header {
            background:#0b3d91;
            color:white;
            padding:15px;
            text-align:center;
        }

        .topbar {
            display:flex;
            justify-content:space-between;
            padding:10px 20px;
            background:#ddd;
        }

        .container { padding:20px; }

        table {
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th, td {
            padding:10px;
            border:1px solid #ccc;
            text-align:center;
        }

        th { background:#0b3d91; color:white; }

        .btn {
            padding:6px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .chat-box {
            background:#fff;
            padding:10px;
            margin-top:20px;
            border-radius:10px;
        }

    </style>
</head>

<body>

<header>StoreKeeper Dashboard</header>

<div class="topbar">
    <div>
        <a href="/retailer/dashboard">Home</a>
        <a href="/chat/inbox">Chat Inbox</a>
    </div>
    <a href="/logout">Logout</a>
</div>

<div class="container">

<h2>Orders</h2>

<table>
<tr>
    <th>ID</th>
    <th>Buyer</th>
    <th>Product</th>
    <th>Qty</th>
    <th>Status</th>
    <th>Update</th>
</tr>

{% for order in orders %}
<tr>
    <td>{{ order.id }}</td>
    <td>{{ order.buyer.username }}</td>
    <td>{{ order.product.name }}</td>
    <td>{{ order.quantity }}</td>
    <td>{{ order.status }}</td>
    <td>
        <form method="POST" action="/retailer/order/{{ order.id }}/status">
            <select name="status">
                <option>pending</option>
                <option>shipped</option>
                <option>delivered</option>
            </select>
            <button class="btn">Update</button>
        </form>
    </td>
</tr>
{% endfor %}
</table>

<!-- CHAT INBOX -->
<div class="chat-box">
    <h3>Product Questions / Chat Inbox</h3>

    <p>Go to:</p>
    <a href="/chat/inbox">Open Chat Inbox</a>
</div>

</div>

</body>
</html>
