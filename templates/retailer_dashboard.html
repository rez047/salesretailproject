<!DOCTYPE html>
<html>
<head>
    <title>Retailer Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        header {
            background: #0b3d91;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #0b3d91;
            color: white;
        }

        .card {
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    Storekeeper Dashboard
</header>

<div class="container">

    <!-- ORDERS -->
    <div class="card">
        <h2>Incoming Orders</h2>

        <table>
            <tr>
                <th>Order ID</th>
                <th>Product</th>
                <th>Buyer</th>
                <th>Email</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Status</th>
                <th>Update</th>
            </tr>

            {% for order in orders %}
            <tr>
                <td>{{ order.id }}</td>
                <td>{{ order.product.name }}</td>
                <td>{{ order.buyer.username }}</td>
                <td>{{ order.buyer.email }}</td>
                <td>{{ order.quantity }}</td>
                <td>{{ order.total_price }}</td>
                <td>{{ order.status }}</td>

                <td>
                    <form method="POST" action="/retailer/order/{{ order.id }}/status">
                        <select name="status">
                            <option value="pending">Pending</option>
                            <option value="processing">Processing</option>
                            <option value="shipped">Shipped</option>
                            <option value="delivered">Delivered</option>
                        </select>
                        <button type="submit">Update</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

</body>
</html>
