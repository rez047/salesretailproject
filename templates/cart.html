<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        header {
            background: #0b3d91;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #0b3d91;
            color: white;
        }

        .btn {
            padding: 6px 10px;
            text-decoration: none;
            border-radius: 5px;
            color: white;
        }

        .remove {
            background: red;
        }

        .shop {
            background: #0b3d91;
            padding: 8px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .checkout {
            background: green;
            padding: 8px;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<header>
    Your Cart
</header>

<div style="padding:10px;">
    <a class="shop" href="/buyer">← Continue Shopping</a>
</div>

<div class="container">

<table>
    <tr>
        <th>Image</th>
        <th>item</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Subtotal</th>
        <th>Action</th>
    </tr>

    {% for item in items %}
    <tr>

        <td>
            {% if item.image %}
                <img src="/static/uploads/items/{{ item.image }}">
            {% else %}
                No Image
            {% endif %}
        </td>

        <td>{{ item.name }}</td>
        <td>{{ item.price }}</td>
        <td>{{ item.quantity }}</td>
        <td>{{ item.subtotal }}</td>

        <td>
            <a class="btn remove" href="/cart/remove/{{ item.id }}">
                Remove
            </a>
        </td>

    </tr>
    {% endfor %}

</table>

<h3>Total: {{ total }}</h3>

<form method="POST" action="/checkout">
    <button class="checkout" type="submit">
        Checkout
    </button>
</form>

</div>

</body>
</html>
