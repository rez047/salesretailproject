<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <style>
        body { font-family: Arial; background:#f4f6f9; }
        table { width:100%; background:white; border-collapse:collapse; }
        th, td { border:1px solid #ddd; padding:10px; text-align:center; }
        th { background:#0b3d91; color:white; }

        .btn { padding:6px 10px; text-decoration:none; border-radius:5px; color:white; }
        .remove { background:red; }
        .shop { background:#0b3d91; padding:8px; color:white; text-decoration:none; }
        .checkout { background:green; padding:8px; border:none; color:white; }
    </style>
</head>

<body>

<header>
    Your Cart
</header>

<div style="padding:10px;">
    <a class="shop" href="/buyer">← Continue Shopping</a>
</div>

<div class="container">

<table>
    <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Subtotal</th>
        <th>Action</th>
    </tr>

    {% for item in items %}
    <tr>
        <td>{{ item.product.name }}</td>
        <td>{{ item.product.price }}</td>
        <td>{{ item.quantity }}</td>

        <td>{{ item.quantity * item.product.price }}</td>

        <td>
            <a class="btn remove" href="/cart/remove/{{ item.id }}">
                Remove
            </a>
        </td>
    </tr>
    {% endfor %}

</table>

<h3>Total:
    {{ total }}
</h3>

<form method="POST" action="/checkout">
    <button class="checkout" type="submit">
        Checkout
    </button>
</form>

</div>

</body>
</html>
