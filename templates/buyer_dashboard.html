<!DOCTYPE html>
<html>
<head>
    <title>Buyer Dashboard</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f9;
        }

        header {
            background: #0b3d91;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: #ddd;
        }

        .container {
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-link {
            background: #ff9800;
            padding: 8px 12px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
        }

        input[type="number"] {
            width: 60px;
            padding: 5px;
            margin-top: 8px;
            text-align: center;
        }

        form {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<header>
    Buyer Dashboard - Shop Products
</header>

<div class="topbar">
    <a href="/cart" class="cart-link">View Cart</a>
    <a href="/logout">Logout</a>
</div>

<div class="container">

    <div class="grid">

        {% for product in products %}
        <div class="card">

            <h3>{{ product.name }}</h3>

            <p>Price: {{ product.price }}</p>

            <p>Stock: {{ product.stock }}</p>

            <!-- FIXED ADD TO CART WITH QUANTITY -->
            <form method="POST" action="/cart/add/{{ product.id }}">

                <label>Qty:</label>
                <input type="number"
                       name="quantity"
                       value="1"
                       min="1"
                       max="{{ product.stock }}"
                       required>

                <br>

                <button class="btn" type="submit">
                    Add to Cart
                </button>

            </form>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
