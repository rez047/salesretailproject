<!DOCTYPE html>
<html>
<head>
<header>
    Buyer Dashboard - Shop Products
</header>

<div class="topbar">
    <div>
        <a href="/buyer">Home</a>
        <a href="/buyer/orders">My Orders</a>
        <a href="/cart">View Cart</a>
    </div>

    <a href="/logout">Logout</a>
</div>

<div class="container">

    <div class="grid">

        {% for product in products %}
        <div class="card">

            {% if product.image %}
                <img src="/static/uploads/products/{{ product.image }}">
            {% else %}
                <img src="/static/uploads/products/default.png">
            {% endif %}

            <h3>{{ product.name }}</h3>

            <p class="price">Price: {{ product.price }}</p>
            <p class="stock">Stock: {{ product.stock }}</p>

            <a class="btn" href="/cart/add/{{ product.id }}">
                Add to Cart
            </a>

            <!-- ⭐ FIXED LINK -->
            <a class="btn" href="/review/product/{{ product.id }}">
                ⭐ Reviews & Q&A
            </a>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
