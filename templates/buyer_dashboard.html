<!DOCTYPE html>
<html>
<head>
<title>Buyer Dashboard</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}

.topbar{
display:flex;justify-content:space-between;
background:#ddd;padding:12px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;padding:15px;border-radius:10px;
}

.img-wrap{
width:100%;height:180px;overflow:hidden;border-radius:8px;
}

.img-wrap img{
width:100%;height:100%;object-fit:cover;
transition:0.3s;
}

.img-wrap:hover img{
transform:scale(1.4);
}

.btn{background:green;color:white;padding:6px;border:none;}

.stock{
font-weight:bold;
}

.out{color:red;}
.low{color:orange;}
.good{color:green;}
</style>
</head>

<body>

<div class="topbar">
<div>
<a href="/buyer">Home</a>
<a href="/buyer/orders">My Orders</a>
<a href="/cart">Cart</a>
<a href="/chat/inbox">Chat</a>
</div>
<a href="/logout">Logout</a>
</div>

<div class="grid">

{% for p in products %}
<div class="card">

<div class="img-wrap">
<img src="/static/uploads/products/{{p.image}}">
</div>

<h3>{{p.name}}</h3>

<p>Price: {{p.price}}</p>

<p class="stock
{% if p.stock==0 %}out{% elif p.stock<=5 %}low{% else %}good{% endif %}
">
Stock: {{p.stock}}
</p>

<a class="btn" href="/cart/add/{{p.id}}">
Add to Cart
</a>

<a class="btn" href="/review/product/{{p.id}}">
Reviews
</a>

<a class="btn" href="/chat/{{p.id}}">
Q&A Chat
</a>

</div>
{% endfor %}

</div>

</body>
</html>
