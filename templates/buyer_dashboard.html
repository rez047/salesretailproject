<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buyer Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

header {
    background: #0b3d91;
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 22px;
}

.topbar {
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    background: #ddd;
}

.topbar a {
    margin-right: 15px;
    font-weight: bold;
    color: #0b3d91;
    text-decoration: none;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* PRODUCTS GRID */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

.product {
    background: #fff;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    text-align: center;
}

/* IMAGE HOVER (same as admin) */
.img-wrap {
    width: 100%;
    height: 160px;
    overflow: hidden;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.3s;
}

.img-wrap:hover img {
    transform: scale(2.2);
}

button {
    background: #0b3d91;
    color: white;
    border: none;
    padding: 8px 10px;
    border-radius: 5px;
    cursor: pointer;
}
</style>

</head>

<body>

<header>Buyer Dashboard</header>

<div class="topbar">
    <div>
        <a href="/buyer">Home</a>
        <a href="/cart">Cart</a>
        <a href="/buyer/orders">My Orders</a>
        <a href="/chat/inbox">Chat</a>
    </div>
    <a href="/logout">Logout</a>
</div>

<div class="container">

<div class="card">
<h2>Available Products</h2>

<div class="products">

{% for p in products %}

<div class="product">

<div class="img-wrap">
{% if p.image %}
<img src="/static/uploads/products/{{p.image}}">
{% else %}
<img src="/static/uploads/products/default.png">
{% endif %}
</div>

<h3>{{p.name}}</h3>
<p><b>KES {{p.price}}</b></p>
<p>Stock: {{p.stock}}</p>

<form method="GET" action="/cart/add/{{p.id}}/1">

    <label>
        Quantity:
    </label>

    <input 
        type="number"
        name="qty"
        value="1"
        min="1"
        max="{{p.stock}}"
        style="width:60px;"
    >

    <button type="submit">
        Add to Cart
    </button>

</form>

</div>

{% endfor %}

</div>

</div>

</div>

</body>
</html>
