<!DOCTYPE html>
<html>
<head>
    <title>Buyer Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        header {
            background: #0b3d91;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: #ddd;
            align-items: center;
        }

        .topbar a {
            text-decoration: none;
            margin-left: 10px;
            color: #0b3d91;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .price {
            font-weight: bold;
            color: #333;
        }

        .stock {
            font-size: 13px;
            color: gray;
        }

        .qty-box {
            margin: 10px 0;
        }

        .qty-box input {
            width: 60px;
            padding: 5px;
            text-align: center;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .cart-link {
            background: #ff9800;
            padding: 8px 12px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>

<header>
    Buyer Dashboard - Shop Products
</header>

<div class="topbar">
    <div>
        <a href="/buyer">Home</a>
        <a href="/cart" class="cart-link">View Cart</a>
    </div>

    <a href="/logout">Logout</a>
</div>

<div class="container">

    <div class="grid">

        {% for product in products %}
        <div class="card">

            {% if product.image %}
                <img src="/static/uploads/products/{{ product.image }}">
            {% else %}
                <img src="/static/uploads/products/default.png">
            {% endif %}

            <h3>{{ product.name }}</h3>

            <p class="price">Price: {{ product.price }}</p>
            <p class="stock">Stock: {{ product.stock }}</p>

            <!-- SIMPLE QUANTITY CONTROL (UI ONLY - backend still adds +1 per click) -->
            <div class="qty-box">
                <small>Quantity controlled in cart</small>
            </div>

            <a class="btn" href="/cart/add/{{ product.id }}">
                Add to Cart
            </a>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
