<!DOCTYPE html>
<html>

<head>

<title>Chat Inbox</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}


.box{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px #ccc;
}


.message{
padding:12px;
border-bottom:1px solid #ddd;
}


.me{
font-weight:bold;
color:#0b3d91;
}


</style>

</head>


<body>


<h2 style="padding:20px">
Chat Inbox
</h2>


<div class="box">


{% for m in messages %}


<div class="message">


{% if m.sender_id == current_user.id %}

<p class="me">
You:
</p>


{% else %}

<p class="me">
User {{m.sender_id}}:
</p>

{% endif %}



<p>
{{m.message}}
</p>



</div>


{% else %}

<p>
No messages yet.
</p>


{% endfor %}



</div>


<a href="/admin">
Back
</a>


</body>

</html>
