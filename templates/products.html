<!DOCTYPE html>
<html>
<head>
  <title>Products</title>

  <style>
    body { font-family: Arial; background:#f4f6f9; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:15px; }
    .card { background:white; padding:15px; border-radius:10px; }
    .btn { background:green; color:white; padding:8px; border:none; cursor:pointer; }

    .box { margin-top:10px; background:#f8f8f8; padding:8px; border-radius:5px; }
    .stars { color:gold; }
  </style>
</head>

<body>

<h2>Products</h2>

<div class="grid" id="products"></div>

<script>
fetch("/products")
.then(res => res.json())
.then(data => {

  let container = document.getElementById("products");

  data.forEach(p => {

    container.innerHTML += `
      <div class="card">

        <h3>${p.name}</h3>
        <p>Price: ${p.price}</p>

        <p id="avg-${p.id}">Loading rating...</p>

        <button class="btn" onclick="addToCart(${p.id})">
          Add to Cart
        </button>

        <!-- REVIEWS -->
        <div class="box">
          <h4>⭐ Review</h4>

          <div id="reviews-${p.id}"></div>

          <select id="rating-${p.id}">
            <option value="5">★★★★★</option>
            <option value="4">★★★★</option>
            <option value="3">★★★</option>
            <option value="2">★★</option>
            <option value="1">★</option>
          </select>

          <textarea id="comment-${p.id}" placeholder="Write review"></textarea>

          <button class="btn" onclick="submitReview(${p.id})">
            Save Review
          </button>
        </div>

        <!-- CHAT -->
        <div class="box">
          <h4>💬 Q&A</h4>

          <div id="chat-${p.id}"></div>

          <input id="msg-${p.id}" placeholder="Ask question">

          <button class="btn" onclick="sendQuestion(${p.id})">
            Send
          </button>
        </div>

      </div>
    `;

    loadReviews(p.id);
    loadChat(p.id);
  });
});

function addToCart(id){
  window.location.href = "/cart/add/" + id;
}

/* =========================
   REVIEWS
========================= */

function loadReviews(productId){

  fetch("/review/" + productId)
  .then(r => r.json())
  .then(data => {

    document.getElementById("avg-" + productId).innerHTML =
      "⭐ " + data.average + " (" + data.count + ")";

    document.getElementById("reviews-" + productId).innerHTML =
      data.reviews.map(r =>
        `<p>⭐ ${r.rating} - ${r.comment}</p>`
      ).join("");
  });
}

function submitReview(productId){

  fetch("/review/add", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      product_id: productId,
      rating: document.getElementById("rating-"+productId).value,
      comment: document.getElementById("comment-"+productId).value
    })
  }).then(() => loadReviews(productId));
}

/* =========================
   CHAT
========================= */

function loadChat(productId){

  fetch("/chat/product/" + productId)
  .then(r => r.json())
  .then(data => {

    document.getElementById("chat-" + productId).innerHTML =
      data.map(m => `<p>User ${m.from}: ${m.msg}</p>`).join("");
  });
}

function sendQuestion(productId){

  let msg = document.getElementById("msg-" + productId).value;

  fetch("/chat/send", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      product_id: productId,
      message: msg,
      receiver_id: 1
    })
  }).then(() => loadChat(productId));
}
</script>

</body>
</html>
