<!DOCTYPE html>
<html>

<head>

<title>Products - Retailshop</title>

<link rel="stylesheet" href="/static/css/style.css">

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}


header{
background:#0b3d91;
color:white;
padding:18px;
text-align:center;
}



.topbar{

background:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;

}


.topbar a{

text-decoration:none;
margin-right:15px;
font-weight:bold;
color:#0b3d91;

}



.container{

padding:20px;

}



.grid{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));
gap:20px;

}



.card{

background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px #ccc;

}



.card img{

width:100%;
height:180px;
object-fit:cover;
border-radius:8px;

}



.btn{

background:green;
color:white;
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
display:inline-block;
margin-top:8px;
}



.box{

margin-top:15px;
background:#f5f5f5;
padding:12px;
border-radius:8px;

}



.stars{

color:gold;

}



input,textarea,select{

width:100%;
padding:7px;
margin-top:5px;

}



.chat-btn{

background:#ff9800;
color:white;
padding:8px;
border-radius:5px;
text-decoration:none;

}



</style>


</head>


<body>



<header>

<h2>Retailshop Products</h2>

</header>



<div class="topbar">


<div>

<a href="/buyer">
Home
</a>


<a href="/buyer/orders">
My Orders
</a>


<a href="/cart">
Cart
</a>


<a href="/chat">
Chat
</a>


</div>



<a href="/logout">
Logout
</a>


</div>




<div class="container">


<div class="grid" id="products">


</div>


</div>





<script>


fetch("/products")

.then(res=>res.json())

.then(products=>{


let container =
document.getElementById("products");



products.forEach(p=>{


container.innerHTML += `


<div class="card">



<img src="
${p.image ?
'/static/uploads/products/'+p.image :
'/static/uploads/products/default.png'}
">



<h3>
${p.name}
</h3>



<p>
Price: ${p.price}
</p>


<p>
Stock: ${p.stock}
</p>





<div id="rating-${p.id}">

Loading rating...

</div>





<button class="btn"
onclick="addToCart(${p.id})">

Add To Cart

</button>





<a class="chat-btn"
href="/chat/${p.id}">

💬 Product Chat

</a>






<div class="box">


<h4>
⭐ Reviews
</h4>



<div id="reviews-${p.id}">

Loading...

</div>



<select id="stars-${p.id}">

<option value="5">
★★★★★
</option>

<option value="4">
★★★★
</option>

<option value="3">
★★★
</option>

<option value="2">
★★
</option>

<option value="1">
★

</option>

</select>




<textarea
id="comment-${p.id}"
placeholder="Write review">
</textarea>




<button class="btn"
onclick="review(${p.id})">

Save Review

</button>


</div>







<div class="box">


<h4>
💬 Product Q&A
</h4>


<p>
Ask about this product.
Retailer/admin can answer.
</p>



<div id="questions-${p.id}">

Loading...

</div>



<input
id="question-${p.id}"
placeholder="Ask question">



<button class="btn"
onclick="ask(${p.id})">

Ask

</button>



</div>





</div>


`;



loadReviews(p.id);

loadQuestions(p.id);



});

});







function addToCart(id){

window.location.href =
"/cart/add/"+id;

}







/*
=====================
REVIEWS
=====================
*/


function loadReviews(id){


fetch("/review/"+id)

.then(r=>r.json())

.then(data=>{


document.getElementById(
"rating-"+id
).innerHTML =

`
⭐ Average:
${data.average}
(${data.count})
`;



let box =
document.getElementById(
"reviews-"+id
);



if(data.reviews.length==0){

box.innerHTML =
"No reviews yet";

return;

}



box.innerHTML =
data.reviews.map(r=>`


<div>


<span class="stars">

${"★".repeat(r.rating)}

</span>


<p>
${r.comment}
</p>


</div>


`).join("");

});


}






function review(id){


fetch("/review/add",
{


method:"POST",


headers:{


"Content-Type":
"application/json"

},


body:JSON.stringify({


product_id:id,


rating:
document.getElementById(
"stars-"+id
).value,


comment:
document.getElementById(
"comment-"+id
).value


})


})

.then(r=>r.json())

.then(data=>{


if(data.error){

alert(data.error);

}
else{

alert("Review saved");

loadReviews(id);

}


});


}









/*
=====================
PRODUCT QUESTIONS
=====================
*/


function loadQuestions(id){


fetch(
"/product/"+id+"/questions"
)

.then(r=>r.json())

.then(data=>{


let box =
document.getElementById(
"questions-"+id
);



if(data.length==0){

box.innerHTML =
"No questions yet";

return;

}




box.innerHTML =
data.map(q=>`


<div>

<b>
Q:
</b>

${q.question}


<br>


<b>
A:
</b>

${q.answer || 
"Waiting for response"}


<hr>


</div>


`).join("");

});


}








function ask(id){


let text =
document.getElementById(
"question-"+id
).value;



if(!text.trim())
return;



fetch(
"/product/"+id+"/question",
{


method:"POST",


headers:{

"Content-Type":
"application/json"

},


body:JSON.stringify({

question:text

})


})

.then(()=>{


document.getElementById(
"question-"+id
).value="";


loadQuestions(id);


});


}



</script>



</body>

</html>
