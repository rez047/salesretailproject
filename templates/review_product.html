<!DOCTYPE html>

<html>

<head>

<title>Review Product</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.card{

background:white;
padding:25px;
margin:40px auto;
width:400px;
border-radius:10px;
box-shadow:0 2px 8px #ccc;

}


button{

background:#0b3d91;
color:white;
padding:10px;
border:none;
border-radius:5px;

}


</style>


</head>


<body>


<div class="card">


<h2>
Review {{product.name}}
</h2>



<form method="POST"
action="/review/add">


<input type="hidden"
name="product_id"
value="{{product.id}}">



<label>
Rating
</label>

<br>


<select name="rating">

<option value="5">
⭐⭐⭐⭐⭐
</option>


<option value="4">
⭐⭐⭐⭐
</option>


<option value="3">
⭐⭐⭐
</option>


<option value="2">
⭐⭐
</option>


<option value="1">
⭐
</option>

</select>



<br><br>


<textarea
name="comment"
placeholder="Write review"
required></textarea>


<br><br>


<button>
Submit Review
</button>



</form>


</div>


</body>

</html>
